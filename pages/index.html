<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Editor</title>

  <style>

    html, body {
      height: 100%;
      margin: 0;
    }

    body {
        margin: 0;
        height: 100vh;
        font-family: Verdana, Geneva, Tahoma, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;

        background-color: #1e3c72;
        background-image: 
            radial-gradient(at 0% 0%, hsla(215, 68%, 27%, 1) 0, transparent 50%), 
            radial-gradient(at 50% 0%, hsla(220, 50%, 45%, 1) 0, transparent 50%), 
            radial-gradient(at 100% 0%, hsla(190, 70%, 50%, 1) 0, transparent 50%),
            radial-gradient(at 0% 100%, hsla(210, 60%, 30%, 1) 0, transparent 50%),
            radial-gradient(at 100% 100%, hsla(240, 50%, 20%, 1) 0, transparent 50%);
    }

    #header { 
      margin-top: 20px;
      color: white;
      text-align: center;
    }

    .editor-container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      margin-top: 15px;
      display: flex;
      gap: 10px;
    }

    .editor {
      width: 300px;
      height: 300px;
      padding: 10px;
      box-sizing: border-box;
      border: 2px solid #ccc;
      border-radius: 6px;
      background-color: #f8f8f8;
      font-size: 14px;
      resize: none;
      outline: none;
      transition: 0.3s;
    }

    .editor:focus {
      border-color: #2a5298;
    }

  </style>
</head>
<body>

  <h3 id="header">You are user: </h3>

  <div class="editor-container">
    <textarea id="textarea1" class="editor" rows="20" cols="60" placeholder="Start typing..."></textarea>
    <textarea id="textarea2" class="editor" rows="20" cols="60" placeholder="Start typing..."></textarea>
    <textarea id="textarea3" class="editor" rows="20" cols="60" placeholder="Start typing..."></textarea>
  </div>

  <!-- Loads the script to handle requests and responses-->
   <script src="/socket.io/socket.io.js"></script> 
   <script>

      // Sends room id as a parameter for socket
      const roomId = new URLSearchParams(window.location.search).get('room')
      const socket = io({
        query: {
          roomId: roomId
        }
      });
      const header = document.getElementById('header');
      
      const urlParams = new URLSearchParams(window.location.search);
      const username = urlParams.get('user'); // Extracts "pd"

      // Selects the textareas from editor class
      const editors = document.querySelectorAll('.editor');

      // Sets the name of the user
      socket.on('connect', () => {
        header.innerText = `User: ${username} \n Room: ${roomId}`;
      });

      // Gets the content from the textarea and sends it to the server
      editors.forEach(editor => {
        editor.addEventListener("input", (e) => {
          socket.emit('content change', {id: e.target.id, val: e.target.value});
        });
      });

      // Updates the textarea with the new content
      socket.on('update content', (msg) => {
        const targetBox = document.getElementById(msg.id);
        console.log(targetBox);
        targetBox.value = msg.val;
      });
   </script>
</body>
</html>
